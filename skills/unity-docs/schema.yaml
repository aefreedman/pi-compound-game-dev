# Unity Documentation Schema
# This schema MUST be validated before writing any documentation file

schema_version: 2

required_fields:
  schema_version:
    type: number
    value: 2
    description: "Unity solution-doc schema version. Use 2 for docs with doc_type/category/failure_mode."

  doc_type:
    type: enum
    values:
      - solution            # Solved concrete problem or incident
      - pattern             # Reusable preventive pattern or best practice
      - workflow            # Repeatable editor/team/process workflow
      - documentation_gap   # Missing, incorrect, or misleading documentation that was discovered
    description: "The kind of knowledge captured by this document"

  category:
    type: enum
    values:
      - build_ci                # Build pipeline, CI, compilation, batchmode, player builds
      - editor_workflow         # Unity Editor usage, editor tools, inspectors, windows, menus
      - asset_pipeline          # Import settings, asset processing, art/audio/model ingest
      - packages_integrations   # Packages, plugins, SDKs, middleware, external services
      - project_configuration   # Project Settings, Player Settings, package/project configuration
      - serialization_data      # Serialization, ScriptableObjects, saved data, property bags
      - prefabs_scenes          # Prefabs, scenes, scene loading, prefab overrides/nesting
      - gameplay_code           # Gameplay/domain C# behavior not owned by another subsystem
      - physics_navigation      # Physics, collision, raycasts, NavMesh, navigation
      - rendering_shaders       # Rendering, shaders, materials, cameras, lighting, VFX
      - ui                      # UI Toolkit, UGUI, Canvas, user-facing interface behavior
      - animation_timeline      # Animator, animation clips, Timeline, Cinemachine sequencing
      - audio                   # Audio playback, mixing, spatial audio
      - input                   # Input System or legacy Input Manager
      - performance             # FPS, memory, GC, profiling, loading/performance regressions
      - platform                # Platform-specific behavior where platform is the owner
      - testing_validation      # Tests, validation tools, screenshots, QA/playtest verification
      - tooling_vcs             # Local tools, scripts, Plastic/Git/VCS workflow support
    description: "Primary retrieval and filing category. This maps to docs/solutions/<category-folder>/ and should identify the owning area."

  failure_mode:
    type: enum
    values:
      - compile_error           # C# compiler or assembly compilation error
      - build_failure           # Player/build/batchmode pipeline failed
      - test_failure            # Automated validation or test failed
      - editor_crash            # Unity Editor crashed
      - editor_hang             # Unity Editor hung/froze/stopped responding
      - runtime_exception       # Runtime exception in Editor play mode or player
      - runtime_crash           # Player/runtime process crashed
      - incorrect_behavior      # Feature behaved incorrectly without a narrower failure mode
      - visual_artifact         # Rendering/UI visual artifact or wrong visual output
      - asset_import_failure    # Asset import/reimport failed or produced bad imported data
      - performance_regression  # FPS, memory, GC, load time, or responsiveness regression
      - missing_reference       # Missing object/component/asset reference was observable
      - data_loss_or_corruption # Data, asset, scene, prefab, or save corruption/loss
      - version_incompatibility # Unity/package/platform version mismatch or incompatibility
      - workflow_friction       # Human/editor workflow was blocked, confusing, or error-prone
      - documentation_gap       # Existing docs were absent, stale, misleading, or insufficient
    description: "Observable shape of the failure. This is separate from category ownership."

  module:
    type: string
    description: "Unity subsystem/module (e.g., 'Physics', 'Rendering', 'UI', 'Animation')"
    examples:
      - "Physics"
      - "Rendering"
      - "UI (UI Toolkit)"
      - "Animation"
      - "Audio"
      - "Input System"
      - "Gameplay Logic"
      - "AI / Navigation"
      - "Networking"
      - "Editor Tools"
      - "Build Pipeline"
      - "Asset Management"
      - "Addressables"
      - "Timeline"
      - "Cinemachine"
      - "Shader Graph"
      - "VFX Graph"

  date:
    type: string
    pattern: '^\d{4}-\d{2}-\d{2}$'
    description: "Date when this problem was solved (YYYY-MM-DD)"

  component:
    type: enum
    values:
      - monobehaviour        # MonoBehaviour scripts
      - scriptable_object    # ScriptableObject assets
      - prefab               # Prefab assets
      - scene                # Scene files
      - material             # Materials
      - shader               # Shaders, Shader Graph
      - animation_controller # Animator Controllers
      - timeline             # Timeline assets
      - addressable          # Addressable assets
      - asset                # General asset (texture, model, audio)
      - editor_script        # Editor scripts, custom inspectors
      - build_script         # Build pipeline scripts
      - package              # Unity packages, Package Manager
      - plugin               # Native plugins, third-party
      - ui_toolkit           # UI Toolkit (UXML, USS, C#)
      - particle_system      # Particle Systems, VFX Graph
      - terrain              # Terrain, terrain tools
      - navmesh              # NavMesh, navigation
      - lighting             # Lighting, light probes, reflection probes
      - canvas               # UGUI Canvas
      - test                 # Automated tests or validation harnesses
      - tooling              # Project-local tooling/scripts not better described above
      - version_control      # Plastic/Git/VCS assets or workflows
    description: "Unity component or project asset/tooling type involved"

  symptoms:
    type: array[string]
    min_items: 1
    max_items: 5
    description: "Observable symptoms (error messages, visual issues, crashes)"
    examples:
      - "NullReferenceException in PlayerController.Update()"
      - "Physics collision not detected between player and enemies"
      - "UI buttons not responding to clicks"

  root_cause:
    type: enum
    values:
      - null_reference          # NullReferenceException
      - lifecycle_timing        # Awake/Start/Update timing issues
      - serialization_error     # [SerializeField], serialization issues
      - missing_reference       # Missing GameObject, Component, or Asset reference
      - circular_dependency     # Circular script dependencies
      - memory_leak             # Memory not being released
      - resource_not_loaded     # Asset not loaded (Addressables, Resources)
      - coroutine_stopped       # Coroutine stopped unexpectedly
      - wrong_thread            # Main thread vs Job System thread issues
      - prefab_override_issue   # Prefab overrides or nesting problems
      - asset_import_settings   # Wrong import settings on asset
      - physics_layer_collision # Layer collision matrix misconfiguration
      - render_pipeline_config  # URP/HDRP settings incorrect
      - scene_not_loaded        # Scene not loaded or additively loaded
      - component_disabled      # Component or GameObject disabled
      - version_incompatibility # Unity version or package version mismatch
      - logic_error             # Algorithm/gameplay logic bug
      - config_error            # Project Settings, Player Settings
      - missing_validation      # Missing null checks or validation
      - tooling_error           # Project-local tooling/script path, invocation, or setup error
      - documentation_gap       # Missing/misleading docs caused the issue or rework
    description: "Fundamental cause of the problem"

  resolution_type:
    type: enum
    values:
      - code_fix               # Fixed by changing C# code
      - asset_reimport         # Fixed by reimporting asset
      - prefab_revert          # Fixed by reverting prefab or applying overrides
      - config_change          # Fixed by changing Project/Player Settings or configuration
      - package_update         # Fixed by updating package version
      - editor_restart         # Fixed by restarting Unity Editor
      - cache_clear            # Fixed by clearing Library cache
      - player_settings_change # Fixed by modifying Player Settings
      - build_settings_change  # Fixed by modifying Build Settings
      - dependency_update      # Fixed by updating dependency
      - environment_setup      # Fixed by environment configuration
      - tooling_addition       # Added helper script or tool
      - documentation_update   # Fixed/prevented by updating documentation
    description: "Type of fix applied"

  severity:
    type: enum
    values:
      - critical             # Blocks development or shipping (build fails, crashes)
      - high                 # Impairs core functionality (feature broken, major bug)
      - medium               # Affects specific feature (visual bug, performance hit)
      - low                  # Minor issue or edge case
    description: "Impact severity"

optional_fields:
  unity_version:
    type: string
    pattern: '^\d{4}\.\d+\.\d+[abfp]\d+$'
    description: "Unity version (e.g., '2022.3.21f1', '2023.2.5f1')"
    examples:
      - "2022.3.21f1"
      - "2023.2.5f1"
      - "6000.0.0f1"

  render_pipeline:
    type: string
    description: "Render pipeline used (Built-in, URP, HDRP)"
    examples:
      - "Built-in"
      - "URP 14.0.8"
      - "HDRP 14.0.8"

  platform:
    type: string
    description: "Platform where issue occurred (Editor, Standalone, Mobile, WebGL, Console). Use metadata here unless the platform owns the category."
    examples:
      - "Windows Editor"
      - "iOS"
      - "Android"
      - "WebGL"
      - "PlayStation 5"
      - "Xbox Series X"

  related_components:
    type: array[string]
    description: "Other components that interact with this issue"

  tags:
    type: array[string]
    max_items: 8
    description: "Searchable keywords (lowercase, hyphen-separated)"
    examples:
      - "null-reference"
      - "update-loop"
      - "physics-collision"
      - "ui-toolkit"

legacy_fields:
  problem_type:
    removed_in: 2
    replacement: "doc_type + category + failure_mode"
    migration_script: "scripts/migrate-unity-docs-schema.ts"

validation_rules:
  - "schema_version must be 2"
  - "doc_type must match one of the enum values"
  - "category must match one of the enum values and determines the docs/solutions/<category-folder>/ filing location"
  - "failure_mode must match one of the enum values"
  - "module must be a valid Unity subsystem or module name"
  - "date must be in YYYY-MM-DD format"
  - "component must match one of the enum values"
  - "symptoms must be specific and observable (not vague)"
  - "root_cause must be the ACTUAL cause, not a symptom"
  - "resolution_type must match one of the enum values"
  - "severity must match one of the enum values"
  - "tags should be lowercase, hyphen-separated"

# Example valid front matter:
# ---
# schema_version: 2
# doc_type: solution
# category: physics_navigation
# failure_mode: runtime_exception
# module: Physics
# date: 2026-06-26
# component: monobehaviour
# symptoms:
#   - "NullReferenceException in PlayerController.Update()"
#   - "Player character freezes when jumping"
# root_cause: null_reference
# unity_version: 2022.3.21f1
# render_pipeline: URP 14.0.8
# platform: Windows Editor
# resolution_type: code_fix
# severity: high
# tags: [null-reference, update-loop, player-controller]
# ---
#
# Example Editor Workflow issue front matter:
# ---
# schema_version: 2
# doc_type: solution
# category: editor_workflow
# failure_mode: workflow_friction
# module: Editor Tools
# date: 2026-06-26
# component: editor_script
# symptoms:
#   - Custom inspector not showing serialized fields
#   - Editor window layout resets on Unity restart
# root_cause: serialization_error
# unity_version: 2022.3.21f1
# resolution_type: code_fix
# severity: medium
# tags: [editor-script, custom-inspector, serialization]
# ---
